<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Access Locked — FeatureFlow</title>
    <link rel="stylesheet" href="/static/SecureGate/css/auth.css"/>
</head>
<body>
<div class="sg-lockout">
    <div class="sg-card" style="max-width:400px">
        <div class="sg-status-page">
            <div class="sg-status-icon error" style="width:72px;height:72px;font-size:32px">🔒</div>
            <div class="sg-status-title">Account Locked</div>
            <div class="sg-status-text">
                Your access has been temporarily suspended due to suspicious activity.
                Please wait one hour or contact support.
            </div>
            <a href="mailto:support@featureflow.io" class="sg-btn"
               style="display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;margin-top:8px">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M2 6l6 4 6-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Contact Support
            </a>
        </div>
    </div>
</div>
</body>
</html>
