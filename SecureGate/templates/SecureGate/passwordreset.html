{% extends 'SecureGate/base.html' %}
{% block content %}
<div class="sg-card">

    <div class="sg-card-header">
        <div class="sg-card-logo">🔑</div>
        <div class="sg-card-title">Create Password</div>
        <div class="sg-card-subtitle">Set a new password for your account</div>
    </div>

    <form class="sg-card-body" id="reset-password" novalidate>
        {% csrf_token %}
        <input type="hidden" name="token" id="token"/>

        <div class="sg-field" id="field-username">
            <div class="sg-input-wrap">
                <span class="sg-input-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </span>
                <input class="sg-input" type="text" name="username" placeholder="Username" required/>
            </div>
            <span class="sg-field-error">Username is required</span>
        </div>

        <div class="sg-field" id="field-password">
            <div class="sg-input-wrap">
                <span class="sg-input-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5"/></svg>
                </span>
                <input class="sg-input" type="password" name="password" placeholder="New password" required/>
            </div>
            <span class="sg-field-error">Password is required</span>
        </div>

        <div class="sg-field" id="field-confirm">
            <div class="sg-input-wrap">
                <span class="sg-input-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5"/></svg>
                </span>
                <input class="sg-input" type="password" name="confirm_password" placeholder="Confirm password" required/>
            </div>
            <span class="sg-field-error">Passwords do not match</span>
        </div>

        <span class="sg-error" id="reset-error"></span>
        <span class="sg-success" id="reset-success"></span>

        <button type="submit" class="sg-btn" id="submit-reset-password">Change Password</button>
    </form>

    <div class="sg-card-footer">
        <a href="/auth" class="sg-link">← Back to login</a>
    </div>
</div>
{% endblock %}

{% block custom_script %}
<script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) document.getElementById('token').value = token;

    document.getElementById('reset-password').addEventListener('submit', function(e) {
        e.preventDefault();
        const pw  = this.password.value.trim();
        const cpw = this.confirm_password.value.trim();

        if (pw !== cpw) {
            showError('Passwords do not match');
            return;
        }

        const fd = new FormData(this);
        fetch('/reset_password/', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                if (data.status === 200) {
                    document.getElementById('reset-error').classList.remove('visible');
                    const s = document.getElementById('reset-success');
                    s.textContent = data.message || 'Password changed successfully.';
                    s.classList.add('visible');
                    setTimeout(() => window.location.href = '/auth', 2000);
                } else {
                    showError(data.error || 'Could not reset password.');
                }
            })
            .catch(() => showError('Server error. Please try again.'));
    });

    function showError(msg) {
        const el = document.getElementById('reset-error');
        el.textContent = msg;
        el.classList.add('visible');
    }
})();
</script>
{% endblock %}
