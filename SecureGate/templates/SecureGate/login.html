{% extends 'SecureGate/base.html' %}
{% block content %}
<div class="sg-card" id="sg-main-card">

    <div class="sg-card-header">
        <div class="sg-card-logo">🏛️</div>
        <div class="sg-card-title">DataSenseHub</div>
        <div class="sg-card-subtitle">Sign in to your account</div>
    </div>

    <form class="sg-card-body" id="login-form" novalidate>
        {% csrf_token %}

        <div class="sg-field" id="field-username">
            <div class="sg-input-wrap">
                <span class="sg-input-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </span>
                <input class="sg-input" type="text" name="username" placeholder="Username" autocomplete="username" required/>
            </div>
            <span class="sg-field-error">Username is required</span>
        </div>

        <div class="sg-field" id="field-password">
            <div class="sg-input-wrap">
                <span class="sg-input-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5"/></svg>
                </span>
                <input class="sg-input" type="password" name="password" placeholder="Password" autocomplete="current-password" required/>
            </div>
            <span class="sg-field-error">Password is required</span>
        </div>

        <span class="sg-error" id="login_error"></span>

        <button type="submit" class="sg-btn" id="login-submit">Sign In</button>
    </form>

    <div class="sg-card-footer">
        <a href="#forgotpassword" onclick="showForgotPassword()" class="sg-link">
            Forgot password?
        </a>
        <a href="#requestaccess" onclick="showRequestAccess()" class="sg-link">
            Request access or report an issue →
        </a>
    </div>
</div>
{% endblock %}
