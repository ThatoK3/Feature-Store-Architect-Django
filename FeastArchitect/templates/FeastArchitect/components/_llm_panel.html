<div class="llm-panel" id="llmPanel">

    <!-- Resize handles -->
    <div class="llm-resize-n"  id="llmResizeN"></div>
    <div class="llm-resize-e"  id="llmResizeE"></div>
    <div class="llm-resize-w"  id="llmResizeW"></div>
    <div class="llm-resize-ne" id="llmResizeNE"></div>
    <div class="llm-resize-nw" id="llmResizeNW"></div>

    <!-- Header -->
    <div class="llm-header" id="llmHeaderDrag">
        <div class="llm-title">
            <div class="llm-title-dot"></div>
            <span>AI Assistant</span>
        </div>
        <div class="llm-header-actions">
            <button class="llm-icon-btn" id="llmMinimizeBtn" onclick="diagram.minimizeLLM()" title="Minimize">
                <svg width="12" height="2" viewBox="0 0 12 2" fill="currentColor"><rect width="12" height="2" rx="1"/></svg>
            </button>
            <button class="llm-icon-btn" onclick="diagram.toggleLLMHelper()" title="Close">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
    </div>

    <!-- Body -->
    <div class="llm-body" id="llmBody">
        <!-- Context chip -->
        <div class="llm-context-bar" id="llmContextContent">
            <span class="llm-context-icon">📊</span>
            <span class="llm-context-text">No node selected</span>
        </div>

        <!-- Quick prompts -->
        <div class="llm-prompts">
            <button class="llm-prompt-btn" onclick="diagram.askLLM('generate_code')">
                <span class="llm-prompt-icon">⚡</span>
                <span class="llm-prompt-label">Generate Code</span>
            </button>
            <button class="llm-prompt-btn" onclick="diagram.askLLM('optimize')">
                <span class="llm-prompt-icon">🚀</span>
                <span class="llm-prompt-label">Optimize</span>
            </button>
            <button class="llm-prompt-btn" onclick="diagram.askLLM('lineage')">
                <span class="llm-prompt-icon">🔗</span>
                <span class="llm-prompt-label">Explain Lineage</span>
            </button>
            <button class="llm-prompt-btn" onclick="diagram.askLLM('validate')">
                <span class="llm-prompt-icon">✅</span>
                <span class="llm-prompt-label">Validate</span>
            </button>
        </div>

        <!-- Messages -->
        <div class="llm-messages" id="llmMessages"></div>

        <!-- Input -->
        <div class="llm-input-area">
            <div class="llm-input-wrap">
                <textarea class="llm-input" id="llmInput"
                    placeholder="Ask anything about your feature store…"
                    oninput="diagram._llmAutoResize(this)"
                    onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter'){diagram.sendLLMMessage();event.preventDefault()}"></textarea>
            </div>
            <div class="llm-input-footer">
                <span class="llm-hint">⌘↵ to send</span>
                <button class="llm-send-btn" onclick="diagram.sendLLMMessage()">
                    <span>Send</span>
                    <svg class="llm-send-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M7 12V2M7 2L3 6M7 2l4 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Minimized bar -->
    <div class="llm-minimized-bar" id="llmMinimizedBar" onclick="diagram.minimizeLLM()">
        <div class="llm-title">
            <div class="llm-title-dot"></div>
            <span>AI Assistant</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
            <span class="llm-minimized-hint">Click to expand</span>
            <button class="llm-icon-btn" onclick="event.stopPropagation();diagram.toggleLLMHelper()" title="Close" style="opacity:0.6">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
    </div>
</div>
